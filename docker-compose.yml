services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-gateway-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ollama-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      # OLLAMA_CONTEXT_LENGTH caps the server default, but clients like openclaw
      # can still override it by sending num_ctx=262144 explicitly in the request.
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-32768}
      # Flash attention is required to enable KV cache quantization.
      - OLLAMA_FLASH_ATTENTION=true
      # Quantize the KV cache to Q4. This cuts KV memory from 3.5 GiB → ~875 MB
      # regardless of what context size the client requests (even 262k).
      # Final footprint: weights 3.0 + KV 0.875 + compute 1.2 = ~5.1 GiB → fits in 6g.
      - OLLAMA_KV_CACHE_TYPE=q4_0
    # mem_limit forces ollama to read available memory from the container cgroup
    # instead of host MemFree (which excludes reclaimable buff/cache).
    # Set to ~75% of total host RAM (host has 7.8 GiB → 6g).
    # memswap_limit allows up to 4g of swap so models can load even when RAM is tight.
    mem_limit: ${OLLAMA_MEM_LIMIT:-6g}
    memswap_limit: ${OLLAMA_MEMSWAP_LIMIT:-10g}
    restart: unless-stopped

  ollama-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-gateway
    ports:
      - "8003:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - SEQ_SERVER_URL=${SEQ_SERVER_URL:-http://host.docker.internal:5340}
      - SEQ_API_KEY=${SEQ_API_KEY:-}
      # Unload mistral from GPU/RAM as soon as a request finishes so that
      # other clients (e.g. openclaw-tui calling qwen3.5:2b) can use the RAM.
      - OLLAMA_KEEP_ALIVE=0
      # Do NOT preload mistral at startup — it would immediately consume ~3.8 GiB.
      - OLLAMA_PRELOAD_MODEL=false
    networks:
      - ollama-network
    depends_on:
      - ollama
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ollama-prometheus
    ports:
      - "9091:9090"
    networks:
      - ollama-network
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    depends_on:
      - ollama-gateway

networks:
  ollama-network:
    driver: bridge

volumes:
  ollama-data:

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: 'ollama-gateway'
          static_configs:
            - targets: ['ollama-gateway:8000']
          metrics_path: '/metrics'
          scrape_interval: 15s
